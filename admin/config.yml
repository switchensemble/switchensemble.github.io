  # ----------------------------
  # Repertoire (2023–2032)
  # ----------------------------
  - name: "repertoire_2023"
    label: "Repertoire (2023)"
    label_singular: "Repertoire Work"
    folder: "_repertoire/2023"
    create: true
    extension: "md"
    format: "frontmatter"
    slug: "{{slug}}"
    summary: "{{title}} — {{composer.last}} ({{yearComposed}})"
    sortable_fields: ["title", "yearComposed"]
    fields: &repertoire_fields
      - label: "Composer"
        name: "composer"
        widget: "object"
        fields:
          - { label: "First", name: "first", widget: "string" }
          - { label: "Last", name: "last", widget: "string" }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Movements", name: "movements", widget: "list", required: false }
      - { label: "Duration (mm:ss)", name: "duration", widget: "string", required: false }
      - { label: "Year Composed", name: "yearComposed", widget: "number", value_type: "int", min: 0 }
      - { label: "Performed By Switch (years)", name: "performedBySwitch", widget: "string", required: false }
      - label: "Commissioned or Written For"
        name: "commissionedOrWrittenFor"
        widget: "select"
        options: ["commissioned", "written for", "unknown"]
        default: "unknown"
      - { label: "Size", name: "size", widget: "string", required: false }
      - { label: "Instrumentation", name: "instrumentation", widget: "list", required: false }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - label: "Media"
        name: "media"
        widget: "list"
        required: false
        fields:
          - { label: "Title", name: "title", widget: "string", required: false }
          - { label: "Type", name: "type", widget: "select", required: false, options: ["audio", "video", "score", "link", "other"] }
          - { label: "URL", name: "url", widget: "string", required: false }

