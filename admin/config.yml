backend:
  name: github
  repo: switchensemble/switchensemble.github.io
  branch: master

  # OAuth proxy (Cloudflare Worker)
  base_url: https://www.switchensemble.com
  auth_endpoint: /auth

publish_mode: editorial_workflow

media_folder: "assets/images/auto-add"
public_folder: "/assets/images/auto-add"

site_url: "https://www.switchensemble.com"
display_url: "https://www.switchensemble.com"

collections:
  - name: "quick_announcement_2026"
    label: "Quick add: Announcement (2026)"
    label_singular: "Announcement"
    folder: "_posts/announcements-2026"
    create: true
    extension: "md"
    format: "frontmatter"
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{date}} – {{title}}"
    sortable_fields: ["date", "title"]
    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "post" }
      - { label: "Title", name: "title", widget: "string" }

      - label: "Date"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        time_format: false
        picker_utc: true

      - label: "Category"
        name: "categories"
        widget: "select"
        options: ["news", "concert", "performance", "updates"]
        default: "news"

      - { label: "Author", name: "author", widget: "string" }

      - { label: "Thumbnail", name: "thumbnail", widget: "image", required: true }
      - { label: "Header", name: "header", widget: "image", required: true }

      - { label: "Body", name: "body", widget: "markdown" }

  - name: "quick_concert_2026"
    label: "Quick add: Concert / Performance (2026)"
    label_singular: "Concert"
    folder: "_posts/concerts-2026"
    create: true
    extension: "md"
    format: "frontmatter"
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{date}} – {{title}}"
    sortable_fields: ["date", "title"]
    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "post" }
      - { label: "Title", name: "title", widget: "string" }

      - label: "Date"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        time_format: false
        picker_utc: true

      - label: "Category"
        name: "categories"
        widget: "select"
        options: ["news", "concert", "performance", "updates"]
        default: "concert"

      - { label: "Author", name: "author", widget: "string" }

      - { label: "Thumbnail", name: "thumbnail", widget: "image", required: true }
      - { label: "Header", name: "header", widget: "image", required: true }

      - { label: "Body", name: "body", widget: "markdown" }