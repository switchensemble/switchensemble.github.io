backend:
  name: github
  repo: switchensemble/switchensemble.github.io
  branch: master

  # OAuth proxy (Cloudflare Worker)
  base_url: https://www.switchensemble.com
  auth_endpoint: /auth

publish_mode: editorial_workflow

media_folder: "assets/images/auto-add"
public_folder: "/assets/images/auto-add"

site_url: "https://www.switchensemble.com"
display_url: "https://www.switchensemble.com"

collections:
  # ----------------------------
  # Posts
  # ----------------------------
  - name: "quick_announcement_2026"
    label: "Quick add: Announcement (2026)"
    label_singular: "Announcement"
    folder: "_posts/announcements-2026"
    create: true
    extension: "md"
    format: "frontmatter"
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{date}} – {{title}}"
    sortable_fields: ["date", "title"]
    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "post" }
      - { label: "Title", name: "title", widget: "string" }

      - label: "Date"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        time_format: false
        picker_utc: true

      - label: "Category"
        name: "categories"
        widget: "select"
        options: ["news", "concert", "performance", "updates"]
        default: "news"

      - { label: "Author", name: "author", widget: "string" }

      - { label: "Thumbnail", name: "thumbnail", widget: "image", required: true }
      - { label: "Header", name: "header", widget: "image", required: true }

      - { label: "Body", name: "body", widget: "markdown" }

  - name: "quick_concert_2026"
    label: "Quick add: Concert / Performance (2026)"
    label_singular: "Concert"
    folder: "_posts/concerts-2026"
    create: true
    extension: "md"
    format: "frontmatter"
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{date}} – {{title}}"
    sortable_fields: ["date", "title"]
    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "post" }
      - { label: "Title", name: "title", widget: "string" }

      - label: "Date"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        time_format: false
        picker_utc: true

      - label: "Category"
        name: "categories"
        widget: "select"
        options: ["news", "concert", "performance", "updates"]
        default: "concert"

      - { label: "Author", name: "author", widget: "string" }

      - { label: "Thumbnail", name: "thumbnail", widget: "image", required: true }
      - { label: "Header", name: "header", widget: "image", required: true }

      - { label: "Body", name: "body", widget: "markdown" }

  # ----------------------------
  # Repertoire (one collection per year folder)
  # Years: 2023–2032
  # ----------------------------
  - name: "repertoire_2023"
    label: "Repertoire (2023)"
    label_singular: "Repertoire Work"
    folder: "_repertoire/2023"
    create: true
    extension: "md"
    format: "frontmatter"
    slug: "{{slug}}"
    summary: "{{title}} — {{composer.last}} ({{yearComposed}})"
    sortable_fields: ["title", "yearComposed"]
    fields: &repertoire_fields
      - label: "Composer"
        name: "composer"
        widget: "object"
        fields:
          - { label: "First", name: "first", widget: "string" }
          - { label: "Last", name: "last", widget: "string" }

      - { label: "Title", name: "title", widget: "string" }

      - label: "Movements"
        name: "movements"
        widget: "list"
        required: false

      - { label: "Duration (mm:ss)", name: "duration", widget: "string", required: false }

      - label: "Year Composed"
        name: "yearComposed"
        widget: "number"
        value_type: "int"
        min: 0

      - label: "Performed By Switch (years)"
        name: "performedBySwitch"
        widget: "string"
        required: false

      - label: "Commissioned or Written For"
        name: "commissionedOrWrittenFor"
        widget: "select"
        options: ["commissioned", "written for", "unknown"]
        default: "unknown"

      - { label: "Size", name: "size", widget: "string", required: false }

      - label: "Instrumentation"
        name: "instrumentation"
        widget: "list"
        required: false

      - label: "Tags"
        name: "tags"
        widget: "list"
        required: false

      - label: "Media"
        name: "media"
        widget: "list"
        required: false
        fields:
          - { label: "Title", name: "title", widget: "string", required: false }
          - { label: "Type", name: "type", widget: "select", required: false, options: ["audio", "video", "score", "link", "other"] }
          - { label: "URL", name: "url", widget: "string", required: false }

  - name: "repertoire_2024"
    label: "Repertoire (2024)"
    label_singular: "Repertoire Work"
    folder: "_repertoire/2024"
    create: true
    extension: "md"
    format: "frontmatter"
    slug: "{{slug}}"
    summary: "{{title}} — {{composer.last}} ({{yearComposed}})"
    sortable_fields: ["title", "yearComposed"]
    fields: *repertoire_fields

