<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Switch~ Ensemble CMS</title>

    <!-- Netlify Identity widget (needed when using Netlify Identity / Git Gateway) -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <!-- Decap CMS -->
    <script src="https://unpkg.com/decap-cms@^3/dist/decap-cms.js"></script>
  </body>

  <script>
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("init", (user) => {
      // If an invite token is present, open the login modal automatically
      const hash = window.location.hash || "";
      if (hash.includes("invite_token") || hash.includes("confirmation_token") || hash.includes("recovery_token")) {
        window.netlifyIdentity.open();
      }
    });

    window.netlifyIdentity.on("login", () => {
      // Always stay inside /admin after login
      if (!window.location.pathname.startsWith("/admin")) {
        window.location.href = "/admin/";
      }
    });
  }
</script>

</html>
