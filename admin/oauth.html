<!DOCTYPE html>
<html>
  <head>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  </head>
  <body>
    <script>
      window.opener.postMessage({
        type: "authorization:github:success",
        token: window.location.hash.match(/access_token=([^&]+)/)[1]
      }, window.location.origin);
      window.close();
    </script>
  </body>
</html>
