name: Sync Repertoire Drafts from Concert Programs

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "_posts/concerts-*/**.md"

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-repertoire:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml python-slugify

      - name: Generate missing repertoire drafts
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          python scripts/sync_repertoire.py

      - name: Commit changes back to PR (if any)
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add _repertoire
          git commit -m "Auto-create repertoire drafts from concert programs"
          git push